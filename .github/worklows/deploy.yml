name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main # Eğer branch adınız master ise burayı master yapın

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: jamesives/github-pages-deploy-action@v4
        with:
          folder: dist # Vite build çıktılarını bu klasöre atar
          branch: gh-pages # Yayına alınacak branch
